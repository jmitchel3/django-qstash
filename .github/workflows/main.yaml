name: CI

on:
  push:
    branches:
      - main
    tags:
      - '**'
    paths:
      - '.github/workflows/**'
      - 'src/**'
      - 'tests/**'
      - 'sample_project/**'
      - 'setup.py'
      - 'pyproject.toml'
      - 'tox.ini'
  pull_request:

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    strategy:
      matrix:
        python-version:
        - '3.10'
        - '3.11'
        - '3.12'
        - '3.13'
        - '3.14'

    steps:
    - uses: actions/checkout@v5

    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: tests/requirements/*.txt

    - name: Install dependencies
      run: uv pip install --system tox tox-uv
      timeout-minutes: 5

    - name: Run tox targets for ${{ matrix.python-version }}
      run: tox run -f py$(echo ${{ matrix.python-version }} | tr -d .)
      timeout-minutes: 15

    - name: Upload coverage data
      uses: actions/upload-artifact@v5
      with:
        name: coverage-data-${{ matrix.python-version }}
        path: '${{ github.workspace }}/.coverage.*'
        include-hidden-files: true
        if-no-files-found: warn

  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: tests
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv pip install --system coverage[toml]
        timeout-minutes: 5

      - name: Download data
        uses: actions/download-artifact@v6
        with:
          path: ${{ github.workspace }}
          pattern: coverage-data-*
          merge-multiple: true

      - name: Combine coverage and fail if it's <90%
        timeout-minutes: 5
        run: |
          python -m coverage combine
          python -m coverage html --skip-covered --skip-empty
          python -m coverage report --fail-under=90
          echo "## Coverage summary" >> $GITHUB_STEP_SUMMARY
          python -m coverage report --format=markdown >> $GITHUB_STEP_SUMMARY

      - name: Upload HTML report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v5
        with:
          name: html-report
          path: htmlcov

  typecheck:
    name: Type check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Run mypy
        run: uv run mypy src/
        timeout-minutes: 5

  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Cache pre-commit hooks
        uses: actions/cache@v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      # Runs every hook on all files so stale formatting (e.g. an outdated
      # black) fails CI instead of silently drifting. mypy is skipped here
      # because the typecheck job already runs it.
      - name: Run pre-commit
        run: uv run pre-commit run --all-files --show-diff-on-failure --color=always
        timeout-minutes: 8
        env:
          # mypy is already covered by the typecheck job. The makemigrations
          # hook imports the sample project's settings, which read these via
          # python-decouple; supply the committed local-dev-only values so the
          # migration check runs in CI too.
          SKIP: mypy
          QSTASH_TOKEN: ci-dummy-token
          QSTASH_CURRENT_SIGNING_KEY: ci-dummy-current
          QSTASH_NEXT_SIGNING_KEY: ci-dummy-next
          DJANGO_QSTASH_DOMAIN: http://localhost:8000

  release:
    needs: [coverage, typecheck, pre-commit]
    if: success() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: release

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7

      - name: Build
        run: uv build
        timeout-minutes: 5

      - uses: pypa/gh-action-pypi-publish@release/v1
        timeout-minutes: 10
